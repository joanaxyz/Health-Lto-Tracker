<div class="lto-section-card">
  <div class="lto-section-header">
    <div class="lto-section-title">
      <span class="glyphicon glyphicon-bell lto-section-icon"></span>
      Recent Alerts (Last 30 Days)
    </div>
    <a class="lto-view-all" href="/x_1998335_health_l_alert_list.do">
      View All <span class="glyphicon glyphicon-chevron-right"></span>
    </a>
  </div>
  <div class="lto-section-body">
    <table class="table table-hover lto-table">
      <thead>
        <tr>
          <th>License #</th>
          <th>Facility</th>
          <th>License Type</th>
          <th>Days to Expiry</th>
          <th>Channel</th>
          <th>Status</th>
          <th>Sent At</th>
        </tr>
      </thead>
      <tbody>
        <tr ng-repeat="alert in alerts"
            ng-click="openLicense(alert.license_sys_id)"
            class="lto-table-row">
          <td><strong ng-bind="alert.license_number"></strong></td>
          <td ng-bind="alert.facility"></td>
          <td ng-bind="alert.license_type"></td>
          <td>
            <span class="label"
                  ng-class="{
                    'label-danger':  alert.days_before_expiry < 30,
                    'label-warning': alert.days_before_expiry >= 30 && alert.days_before_expiry < 60,
                    'label-info':    alert.days_before_expiry >= 60
                  }"
                  ng-bind="alert.days_before_expiry + 'd'"></span>
          </td>
          <td>
            <span class="label"
                  ng-class="{
                    'label-primary': alert.channel === 'email',
                    'label-default': alert.channel === 'in_app'
                  }"
                  ng-bind="alert.channel === 'email' ? 'Email' : 'In-App'"></span>
          </td>
          <td>
            <span class="label"
                  ng-class="{
                    'label-success': alert.status === 'sent',
                    'label-danger':  alert.status === 'failed'
                  }"
                  ng-bind="alert.status === 'sent' ? 'Sent' : 'Failed'"></span>
          </td>
          <td ng-bind="alert.sent_at"></td>
        </tr>
        <tr ng-if="alerts.length === 0">
          <td colspan="7" class="lto-empty-row">
            <span class="glyphicon glyphicon-bell"></span>
            No alerts in the last 30 days.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
